<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <div class="wrapper">

        <div class="page1">
            <nav>
                <h1> YOUR EXPENSES, <br>
                    UNDER CONTROL.</h1>
                <div class="total">
                    <div class="headline">
                        <p>Total Expense</p>
                    </div>
                    <div class="t-amount">
                        <p>₹0.00</p>
                    </div>
                </div>
            </nav>
            <div class="hero">
                <div class="box">
                    <p>ENTRIES</p>
                    <div class="enter">0</div>
                </div>
                <div class="box">
                    <p>HIGHEST</p>
                    <div class="enter">0</div>
                </div>
                <div class="box">
                    <p>LATEST</p>
                    <div class="enter">0</div>
                </div>
            </div>
            <div class="main">
                <div class="box b-main">
                    <div class="top">
                        <p>ADD NEW EXPENSE</p>
                    </div>
                    <div class="bottom">
                        <div class="element one">
                            <p>NAME</p>

                            <input type="text" class="input">

                        </div>
                        <div class="element two">
                            <p>AMOUNT (₹)</p>

                            <input type="number" class="input2">

                        </div>
                        <div class="add">
                            <div class="btn-add">+ Add</div>
                        </div>
                    </div>
                </div>
            </div>
            <hr>
            <div class="list">
                <div class="list-nav">
                    <p>All expenses</p>
                    <div class="item">0 items</div>
                </div>
                <div class="output">
                    <div class="left">cookies</div>
                    <div class="right">₹70</div>
                </div>

            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
